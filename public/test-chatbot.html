<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="utf-8">
    <title>اختبار الدردشة الطبية</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        button { padding: 10px 15px; background: #667eea; color: white; border: none; cursor: pointer; }
        input { padding: 8px; margin: 5px; width: 200px; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>اختبار الدردشة الطبية</h1>
    
    <div class="test-section">
        <h2>1. اختبار البحث عن المريض</h2>
        <input type="number" id="patientId" placeholder="رقم التذكرة" value="1">
        <button onclick="testSearch()">بحث</button>
        <pre id="searchResult"></pre>
    </div>

    <div class="test-section">
        <h2>2. اختبار الدردشة</h2>
        <input type="number" id="chatPatientId" placeholder="رقم المريض" value="1">
        <input type="text" id="chatMessage" placeholder="السؤال" value="ما هي نصائحك لحالتي؟">
        <button onclick="testChat()">إرسال</button>
        <pre id="chatResult"></pre>
    </div>

    <script>
        async function testSearch() {
            const patientId = document.getElementById('patientId').value;
            const resultDiv = document.getElementById('searchResult');
            
            resultDiv.textContent = 'جاري البحث...';
            
            try {
                const response = await fetch(`/api/patient/${patientId}`);
                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.textContent = 'خطأ: ' + error.message;
            }
        }

        async function testChat() {
            const patientId = document.getElementById('chatPatientId').value;
            const message = document.getElementById('chatMessage').value;
            const resultDiv = document.getElementById('chatResult');
            
            resultDiv.textContent = 'جاري الإرسال...';
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-TOKEN': document.querySelector('meta[name="csrf-token"]')?.content || ''
                    },
                    body: JSON.stringify({
                        patient_id: parseInt(patientId),
                        message: message
                    })
                });
                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.textContent = 'خطأ: ' + error.message;
            }
        }
    </script>
</body>
</html>
